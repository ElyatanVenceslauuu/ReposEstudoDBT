version: 2

models:
  - name: trusted_venda
    description: "Cabeçalho de vendas (1 linha por ID_DA_VENDA)."
    columns:
      - name: ID_DA_VENDA
        tests:
          - not_null
          - unique

      - name: ID_CLIENTE
        tests:
          - not_null
          - relationships:
              to: ref('trusted_cliente_venda')
              field: ID_CLIENTE

      - name: ID_VENDEDOR
        tests:
          - relationships:
              to: ref('trusted_vendedor_venda')
              field: ID_VENDEDOR

      - name: ID_ENTREGADOR
        tests:
          - relationships:
              to: ref('trusted_entregador_venda')
              field: ID_ENTREGADOR