version: 2

models:
  - name: trusted_venda_item
    description: "Itens de venda (1 linha por ID_DA_VENDA + ID_PRODUTO)."

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: ["ID_DA_VENDA", "ID_PRODUTO"]

    columns:
      - name: ID_DA_VENDA
        tests:
          - not_null
          - relationships:
              to: ref('trusted_venda')
              field: ID_DA_VENDA

      - name: ID_PRODUTO
        tests:
          - not_null
          - relationships:
              to: ref('trusted_produto_venda')
              field: ID_PRODUTO

